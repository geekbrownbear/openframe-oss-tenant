
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openframe-config
spec:
  replicas: 1
  revisionHistoryLimit: 2
  minReadySeconds: 10
  selector:
    matchLabels:
      app: openframe-config
  template:
    metadata:
      labels:
        app: openframe-config
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        prometheus.io/port: "8889"
        prometheus.io/path: "/management/{{ .Values.image.tag }}/prometheus"
    spec:

      containers:
        - name: openframe-config
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 8888
              name: http
            - containerPort: 8889
              name: management

          envFrom:
            - configMapRef:
                name: openframe-config
          env:
            - name: RELEASE_VERSION
              value: "{{ .Values.image.tag }}"

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          startupProbe:
            httpGet:
              path: /xml/shared-logback-spring.xml
              port: http
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 36   # up to 3m to start (initial git clone included)
          livenessProbe:
            httpGet:
              path: /xml/shared-logback-spring.xml
              port: http
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /xml/shared-logback-spring.xml
              port: http
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
