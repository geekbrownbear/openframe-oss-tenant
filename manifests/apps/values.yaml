
deployment:
  ingress:
    localhost:
      enabled: true   # Enable localhost ingress with nginx
    ngrok:
      enabled: false  # Enable ngrok ingress for external access
      credentials:
        apiKey: ""
        authtoken: ""

repository:
  baseDir: manifests
  URL: https://github.com/flamingo-stack/openframe-oss-tenant.git
  branch: main


# ── Platform tier ──────────────────────────────────────────────────────────
# One Application per platform.apps entry, sourced from manifests/platform/<name>.
# ngrok-operator and ingress-nginx additionally follow deployment.ingress:
# localhost.enabled skips ngrok-operator, ngrok.enabled skips ingress-nginx.
platform:
  enabled: true
  namespace: platform
  project: platform
  apps:
    namespace-platform:
      enabled: true
      syncWave: "-1"
      namespace: default        # only creates the (cluster-scoped) platform ns → target default
    ngrok-operator:
      enabled: false
    ingress-nginx:
      enabled: true
    dev-tools:
      enabled: true
    openframe-config:
      enabled: true
      syncWave: "1"

# ── Datasources tier ───────────────────────────────────────────────────────
# One Application per datasources.apps entry, sourced from manifests/datasources/<name>.
datasources:
  enabled: true
  namespace: datasources
  project: datasources
  apps:
    namespace-datasources:
      enabled: true
      syncWave: "-1"
      namespace: default        # only creates the (cluster-scoped) datasources ns → target default
    cassandra:
      enabled: true
      syncWave: "1"
    debezium-connect:
      enabled: true
      syncWave: "1"
    kafka:
      enabled: true
      syncWave: "1"
    mongodb:
      enabled: true
      syncWave: "1"
    mongodb-meshcentral:
      enabled: true
      syncWave: "1"
    mysql-fleetmdm:
      enabled: true
      syncWave: "1"
    nats:
      enabled: true
      syncWave: "1"
    pinot:
      enabled: true
      syncWave: "1"
    redis-cluster:
      enabled: true
      syncWave: "1"
    zookeeper:
      enabled: true
      syncWave: "1"

# ── Tenant tier ────────────────────────────────────────────────────────────
# ONE Application sourcing the manifests/tenant umbrella (fleet, meshcentral
# and the openframe services). OSS is single-tenant, so this is a plain
# Application, not the fleet-driven ApplicationSet used on SaaS.
tenant:
  enabled: true
  id: "tenant-XXX-X-X"
  uuid: ""
  namespace: tenant
  project: tenant
  syncWave: "2"
  # Extra values for the tenant umbrella (e.g. openframe-saas.image.tag);
  # deep-merged over the deployment block (tenant.values wins per key).
  values: {}
