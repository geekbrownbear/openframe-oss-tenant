{{- /*
Platform tier — one Application per entry in .Values.platform.apps.
Each Application sources manifests/platform/<name>. Destination namespace
defaults to .Values.platform.namespace; an app may override with its own
`namespace:` (e.g. namespace-platform targets `default` since it *creates*
the platform namespace itself).

Ingress switch: deployment.ingress picks ONE ingress app —
localhost.enabled skips ngrok-operator, ngrok.enabled skips ingress-nginx.
*/ -}}

{{- $ingress := dig "ingress" (dict) .Values.deployment }}
{{- $localhostOn := dig "localhost" "enabled" false $ingress }}
{{- $ngrokOn := dig "ngrok" "enabled" false $ingress }}

{{- if .Values.platform.enabled }}
{{- range $name, $app := .Values.platform.apps }}
{{- $disabled := and (hasKey $app "enabled") (eq $app.enabled false) }}
{{- $ingressSkip := or (and $localhostOn (eq $name "ngrok-operator")) (and $ngrokOn (eq $name "ingress-nginx")) }}
{{- if not (or $disabled $ingressSkip) }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ $name }}
  annotations:
    argocd.argoproj.io/sync-wave: "{{ $app.syncWave | default "0" }}"
    {{- if get ($app.syncOptions | default dict) "ServerSideDiff" | default false }}
    argocd.argoproj.io/compare-options: ServerSideDiff=true
    {{- end }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io

spec:
  project: {{ $.Values.platform.project }}

  sources:
    - repoURL: {{ $.Values.repository.URL }}
      targetRevision: {{ $.Values.repository.branch }}
      path: "{{ $.Values.repository.baseDir }}/platform/{{ $name }}"
      helm:
        valueFiles:
          - "values-{{ $.Values.environment }}.yaml"
        ignoreMissingValueFiles: true
        values: |
          environment: {{ $.Values.environment }}
          deployment:
{{ toYaml $.Values.deployment | indent 12 }}
{{- $appValues := include "app.values" (list $name $app $.Values) | trim }}
{{- if ne $appValues "" }}
{{ $appValues | indent 10 }}
{{- end }}

  destination:
    name: in-cluster
    namespace: {{ $app.namespace | default $.Values.platform.namespace }}

  syncPolicy:
    retry:
      limit: 3
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 1m
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply={{ (get $app "syncOptions" | default dict).ServerSideApply | default false }}
      - RespectIgnoreDifferences={{ (get $app "syncOptions" | default dict).RespectIgnoreDifferences | default false }}

  {{- if (get $app "syncOptions" | default dict).RespectIgnoreDifferences | default false }}
  ignoreDifferences:
{{ include (printf "app-helpers.%s.ignoreDifferences" $name) . | indent 4 }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
