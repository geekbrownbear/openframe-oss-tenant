{{- if .Values.fleet.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: fleet-server
data:
  FLEET_SERVER_ADDRESS: "fleet-service.{{ .Values.tenant.namespace }}.svc.cluster.local"
  FLEET_SERVER_PORT: "8080"
  FLEET_SERVER_QUERY_RESULTS_TTL: "720h"
  FLEET_SERVER_QUERY_RESULTS_CLEANUP_INTERVAL: "1h"
  FLEET_SETUP_ADMIN_EMAIL: {{ .Values.fleet.fleet.setup.adminEmail | quote }}
  test: "test"
{{- end }}
