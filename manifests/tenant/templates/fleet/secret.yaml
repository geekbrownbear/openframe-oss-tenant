{{- if .Values.fleet.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: fleet-server
type: Opaque
stringData:
  FLEET_SETUP_ADMIN_PASSWORD: "openframe123!"

---

# fleet reads MYSQL_PASSWORD from this Secret in the release namespace
# (fleet.database.existingSecret); must match manifests/datasources/mysql-fleetmdm
apiVersion: v1
kind: Secret
metadata:
  name: fleetmdm-mysql
type: Opaque
stringData:
  MYSQL_PASSWORD: "fleet-mdm-password-1234"
{{- end }}
