{{- $saas := index .Values "openframe-saas" -}}
{{- $svc := index $saas "api" -}}
{{- $mgmt := index $saas "management" -}}
{{- if and $saas.enabled $svc.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openframe-api
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: openframe-api
  template:
    metadata:
      labels:
        app: openframe-api
      annotations:
        {{- with (default $saas.podAnnotations $svc.podAnnotations) }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        prometheus.io/port: "8091"
        prometheus.io/path: "/management/{{ default $saas.image.tag $svc.image.tag }}/prometheus"

    spec:
      initContainers:
        - name: wait-for-config-server
          image: "{{ .Values.initImage.registry }}/{{ .Values.initImage.repository }}:{{ .Values.initImage.tag }}"
          command: ["sh", "-c", "until curl -f $SPRING_CONFIG_URL/xml/shared-logback-spring.xml; do sleep 1; done"]
          env:
            - name: SPRING_CONFIG_URL
              valueFrom:
                configMapKeyRef:
                  name: tenant
                  key: SPRING_CONFIG_URL
        - name: wait-for-management-server
          image: "{{ .Values.initImage.registry }}/{{ .Values.initImage.repository }}:{{ .Values.initImage.tag }}"
          command: ["sh", "-c", "until curl -f http://openframe-management.{{ .Values.tenant.namespace }}.svc.cluster.local:8096/management/{{ default $saas.image.tag $mgmt.image.tag }}/health; do sleep 1; done"]

      containers:
        - name: openframe-api
          image: "{{ default $saas.image.registry $svc.image.registry }}/{{ $svc.image.repository }}:{{ default $saas.image.tag $svc.image.tag }}"
          ports:
            - containerPort: 8090
              name: http
            - containerPort: 8091
              name: management

          envFrom:
            - configMapRef:
                name: tenant
          env:
            - name: RELEASE_VERSION
              value: "{{ default $saas.image.tag $svc.image.tag }}"
            {{- if .Values.deployment.ingress.ngrok.enabled }}
            - name: TENANT_HOST_URL
              value: {{ printf "https://%s" (required "deployment.ingress.ngrok.url is required when ngrok ingress is enabled" .Values.deployment.ingress.ngrok.url) | quote }}
            {{- else if .Values.deployment.ingress.localhost.enabled }}
            - name: TENANT_HOST_URL
              value: "https://localhost"
            {{- end }}

          resources:
            {{- toYaml $svc.resources | nindent 12 }}

          startupProbe:
            httpGet:
              path: /management/{{ default $saas.image.tag $svc.image.tag }}/health/liveness
              port: management
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 48
          livenessProbe:
            httpGet:
              path: /management/{{ default $saas.image.tag $svc.image.tag }}/health/liveness
              port: management
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /management/{{ default $saas.image.tag $svc.image.tag }}/health/readiness
              port: management
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
{{- end }}
